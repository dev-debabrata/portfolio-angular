<section id="home" class="hero-section">
  <div class="hero-container">
    <div class="hero-content">
      <h2 class="greeting">
        {{ heroContent().greeting }}
      </h2>

      <h1 class="hero-name">
        <span class="name-left">
          {{ heroContent().firstName }}
        </span>

        <span class="name-right">
          {{ heroContent().lastName }}
        </span>
      </h1>

      <h2 class="hero-role">
        {{ heroContent().role }}
      </h2>

      <p class="hero-description" [innerHTML]="heroContent().profileDescription"></p>

      <div class="hero-buttons">
        <a href="#contact" class="btn primary-btn">
          Contact Me
          <i class="fa-regular fa-paper-plane"></i>
        </a>

        <a
          [href]="resumeUrl()"
          target="_blank"
          rel="noopener noreferrer"
          class="btn secondary-btn"
          [class.disabled]="!resumeUrl()"
          [attr.title]="'Debabrata Das — Resume'"
        >
          Download CV
          <i class="fa-solid fa-download"></i>
        </a>
      </div>

      <div class="hero-socials">
        @for (item of socialLinks; track item.name) {
          <a
            [href]="item.link"
            target="_blank"
            rel="noopener noreferrer"
            [attr.aria-label]="item.name"
          >
            <i [class]="item.icon"></i>
          </a>
        }
      </div>
    </div>

    <div class="hero-image">
      <img [src]="heroContent().imageUrl" alt="Debabrata Das" />
    </div>
  </div>
</section>
