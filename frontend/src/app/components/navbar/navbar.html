<nav class="navbar" [class.scrolled]="isScrolled">
  <div class="nav-container">
    <a routerLink="/" class="logo">
      <span class="logo-left">&lt;Debabrata</span>
      <span class="logo-right">Das /&gt;</span>
    </a>

    <ul class="nav-links">
      @for (item of navbarMenu; track item.id) {
        <li [class.active]="activeSection === item.id">
          <button (click)="handleNavigation(item)">
            {{ item.title }}
            <span></span>
          </button>
        </li>
      }
    </ul>

    <!-- Desktop Theme -->
    <button class="theme-btn desktop-theme" (click)="toggleTheme()">
      <lucide-icon [name]="isDark ? 'moon' : 'sun'" [size]="20"></lucide-icon>
    </button>

    <!-- Mobile Right Side -->
    <div class="mobile-actions">
      <button class="theme-btn" (click)="toggleTheme()">
        <lucide-icon [name]="isDark ? 'moon' : 'sun'" [size]="20"></lucide-icon>
      </button>

      <button class="menu-btn" (click)="toggleMenu()">
        <lucide-icon [name]="isOpen ? 'x' : 'menu'" [size]="20"></lucide-icon>
      </button>
    </div>

    @if (isOpen) {
      <div class="mobile-menu">
        <ul>
          @for (item of navbarMenu; track item.id) {
            <li [class.active]="activeSection === item.id">
              <button (click)="handleNavigation(item)">
                {{ item.title }}
              </button>
            </li>
          }
        </ul>
      </div>
    }
  </div>
</nav>
