<div class="admin-about">
  <h3>About Management</h3>

  <label>Description</label>
  <textarea
    rows="8"
    placeholder="Write about yourself..."
    [value]="aboutForm().description"
    (input)="updateField('description', $any($event.target).value)"
  ></textarea>

  <div class="input-box">
    <div class="input-item">
      <label>Email</label>
      <input
        type="email"
        placeholder="Enter email"
        [value]="aboutForm().email"
        (input)="updateField('email', $any($event.target).value)"
      />
    </div>

    <div class="input-item">
      <label>Location</label>
      <input
        type="text"
        placeholder="Enter location"
        [value]="aboutForm().location"
        (input)="updateField('location', $any($event.target).value)"
      />
    </div>
  </div>

  <button (click)="saveAbout()" [disabled]="saving()">
    {{ saving() ? 'Saving...' : 'Save About' }}
  </button>
</div>
