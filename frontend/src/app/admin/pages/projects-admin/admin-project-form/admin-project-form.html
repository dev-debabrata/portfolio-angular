<div class="project-list-form">
  <h3>{{ editingId() ? 'Edit Project' : 'Add Project' }}</h3>
  <form class="project-form" (submit)="$event.preventDefault(); submitProject()">
    <div class="input-box">
      <div class="form-group">
        <label>Title</label>
        <input
          type="text"
          placeholder="Project title"
          [value]="projects().title"
          (input)="updateField('title', $any($event.target).value)"
        />
      </div>

      <div class="form-group">
        <label>Category</label>
        <input
          type="text"
          placeholder="Frontend / MERN / Angular"
          [value]="projects().category"
          (input)="updateField('category', $any($event.target).value)"
        />
      </div>
    </div>

    <div class="input-box">
      <div class="form-group">
        <label>Project Image</label>
        <input type="file" accept="image/*" (change)="onImageSelected($event)" />

        @if (imagePreview()) {
          <div class="image-preview-box">
            <img class="preview-img" [src]="imagePreview()" alt="Project Preview" />

            <button type="button" class="remove-image-btn" (click)="removeImage()">
              <lucide-icon name="x" [size]="16"></lucide-icon>
            </button>
          </div>
        }

        <!-- @if (imagePreview()) {
          <img class="preview-img" [src]="imagePreview()" alt="Project Preview" />
        } -->
      </div>

      <div class="form-group">
        <label>Technologies</label>
        <div class="tech-input">
          <input
            type="text"
            placeholder="Angular"
            [value]="technologyInput()"
            (input)="technologyInput.set($any($event.target).value)"
          />

          <button type="button" (click)="addTechnology()">Add</button>
        </div>

        <div class="tech-list">
          @for (tech of projects().technologies; track tech; let i = $index) {
            <span>
              {{ tech }}
              <button type="button" (click)="removeTechnology(i)">
                <lucide-icon name="x" [size]="16"></lucide-icon>
              </button>
            </span>
          }
        </div>
      </div>
    </div>

    <div class="input-box">
      <div class="form-group">
        <label>Live URL</label>
        <input
          type="text"
          placeholder="Live project URL"
          [value]="projects().liveUrl"
          (input)="updateField('liveUrl', $any($event.target).value)"
        />
      </div>

      <div class="form-group">
        <label>GitHub URL</label>
        <input
          type="text"
          placeholder="GitHub URL"
          [value]="projects().githubUrl"
          (input)="updateField('githubUrl', $any($event.target).value)"
        />
      </div>
    </div>

    <label>Description</label>
    <textarea
      rows="4"
      placeholder="Project description"
      [value]="projects().description"
      (input)="updateField('description', $any($event.target).value)"
    ></textarea>

    <div class="button-box">
      <button type="submit" [disabled]="loading()">
        {{ loading() ? 'Saving...' : editingId() ? 'Update Project' : 'Create Project' }}
      </button>
    </div>
  </form>
</div>
