<div class="blog-list">
  <div class="header">
    <h2>Blogs</h2>

    <button (click)="addBlog()">Add Blog</button>
  </div>

  <div class="blog-scroll">
    <div class="cards">
      @for (blog of blogs(); track blog._id) {
        <div class="card">
          <div class="image-wrapper">
            <img [src]="blog.image" [alt]="blog.title" />

            <button class="view-blog-btn" (click)="viewBlog(blog.slug)">
              <lucide-icon name="link-2" [size]="22"></lucide-icon>
            </button>
          </div>

          <div class="card-content">
            <h3>{{ blog.title }}</h3>

            <div class="tag-list">
              @for (tag of blog.tags; track tag) {
                <span>{{ tag }}</span>
              }
            </div>

            <div class="actions">
              <button (click)="editBlog(blog.slug)">Edit</button>

              <button class="delete-btn" (click)="deleteBlog(blog._id)">Delete</button>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</div>
